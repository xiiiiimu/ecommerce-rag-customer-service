spring.application.name=knowledge_system

# LLM: DeepSeek（OpenAI 兼容 API）
spring.ai.model.chat=openai
spring.ai.openai.api-key=${DEEPSEEK_API_KEY}
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.chat.options.model=deepseek-chat

# Embedding: Ollama（本地）
spring.ai.model.embedding=ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

# DeepSeek HTTP 客户端代理
# direct=不走代理 | http=HTTP 代理 | socks=SOCKS 代理 | auto=跟随 JVM 系统代理
app.openai.http.proxy-mode=direct

server.port=8080
server.tomcat.basedir=${TOMCAT_BASEDIR:./temp}

spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5433/knowledge_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.knowledge_system.entity
mybatis.configuration.map-underscore-to-camel-case=true

spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.timeout=3000ms

spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.consumer.group-id=knowledge-system-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.knowledge_system.dto
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

elasticsearch.url=http://localhost:9200

file.upload-dir=uploads

logging.file.name=logs/app.log
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web.client=DEBUG
logging.level.org.springframework.http.client=DEBUG
logging.level.com.example.knowledge_system.health=INFO

# Reliability / Agentic RAG orchestration (set true to enable)
reliability.enabled=true
reliability.escalation-threshold=8
reliability.escalation-decay-per-turn=1
